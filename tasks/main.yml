---
# Sanity check so we don't accidentally remove all access to the cluster on AWS:
- when: (k8s_cluster_type == "aws") and (k8s_iam_users|length == 0)
  ansible.builtin.fail:
    msg: "Set k8s_iam_users to a list of IAM usernames who should have access to manage the cluster"

- name: Remove cert-manager
  kubernetes.core.k8s:
    context: "{{ k8s_context|mandatory }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    wait: yes
    definition: "{{ lookup('template', 'cert-manager.yaml') }}"
    state: absent
  when: k8s_purge_cert_manager

- name: Remove ingress-nginx
  kubernetes.core.k8s:
    context: "{{ k8s_context|mandatory }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    wait: yes
    definition: "{{ lookup('template', 'ingress-nginx/mandatory.yaml') }}"
    state: absent
  when: k8s_purge_ingress_controller

- name: Deploy AWS Load Balancer Controller and Dependecies
  tags: aws-lbc
  block:
    - name: Get AWS Account ID
      amazon.aws.aws_caller_info:
        aws_profile: "{{ aws_profile | mandatory }}"
      register: caller_info

    - name: Fetch LBC Policy JSON from GitHub
      ansible.builtin.uri:
        url: "https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/{{ k8s_aws_load_balancer_controller_chart_version }}/docs/install/iam_policy.json"
        return_content: yes
      register: aws_lbc_policy

    - name: Create IAM Policy for AWS Load Balancer Controller
      amazon.aws.iam_managed_policy:
        aws_profile: "{{ aws_profile | mandatory }}"
        policy_name: "{{ k8s_cluster_name }}-eks-aws-lbc-policy"
        state: present
        policy: "{{ aws_lbc_policy.content | from_json }}"
      register: iam_policy

    - name: Create IAM Role with Trust Relationship
      amazon.aws.iam_role:
        aws_profile: "{{ aws_profile | mandatory }}"
        role_name: "{{ k8s_cluster_name }}-eks-aws-lbc-role"
        state: present
        assume_role_policy_document: "{{ lookup('template', 'aws/trust-policy.json.j2') }}"
        managed_policies:
          - "{{ iam_policy.policy.arn }}"
      vars:
        account_id: "{{ caller_info.account }}"
        oidc_issuer: >-
          {{ lookup('pipe', 'aws eks describe-cluster 
          --name ' + k8s_cluster_name + ' 
          --query "cluster.identity.oidc.issuer" 
          --output text') | replace('https://', '') }}
      register: iam_role

    - name: Create AWS Load Balancer Controller ServiceAccount
      kubernetes.core.k8s:
        context: "{{ k8s_context|mandatory }}"
        kubeconfig: "{{ k8s_kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: "aws-load-balancer-controller"
            namespace: "kube-system"
            annotations:
              eks.amazonaws.com/role-arn: "{{ iam_role.iam_role.arn }}"

    - name: Add AWS Load Balancer Controller
      kubernetes.core.helm:
        context: "{{ k8s_context|mandatory }}"
        kubeconfig: "{{ k8s_kubeconfig }}"
        chart_repo_url: "https://aws.github.io/eks-charts"
        chart_ref: aws-load-balancer-controller
        chart_version: "{{ k8s_aws_load_balancer_controller_chart_version }}"
        release_name: "aws-load-balancer-controller"
        release_namespace: "kube-system"
        release_values:
          clusterName: "{{ k8s_cluster_name }}"
          serviceAccount:
            create: false
            name: aws-load-balancer-controller
        wait: yes
  when: "'aws' in k8s_cluster_type"

- name: Apply Descheduler Helm chart
  kubernetes.core.helm:
    context: "{{ k8s_context|mandatory }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    chart_repo_url: https://kubernetes-sigs.github.io/descheduler/
    chart_ref: descheduler
    chart_version: "{{ k8s_descheduler_chart_version }}"
    release_name: descheduler
    release_namespace: "kube-system"
    release_values: "{{ k8s_descheduler_release_values }}"
    wait: yes
  when: k8s_install_descheduler

- name: Create ingress-nginx namespace
  kubernetes.core.k8s:
    context: "{{ k8s_context|mandatory }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    name: "{{ k8s_ingress_nginx_namespace }}"
    api_version: v1
    kind: Namespace
    state: present
  when: k8s_install_ingress_controller

- name: Create cert-manager namespace
  kubernetes.core.k8s:
    context: "{{ k8s_context|mandatory }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    name: "{{ k8s_cert_manager_namespace }}"
    api_version: v1
    kind: Namespace
    state: present
  when: k8s_install_cert_manager

- name: Add ingress-nginx Helm chart
  kubernetes.core.helm:
    context: "{{ k8s_context|mandatory }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    chart_repo_url: "https://kubernetes.github.io/ingress-nginx"
    chart_ref: ingress-nginx
    # https://github.com/kubernetes/ingress-nginx/tags
    chart_version: "{{ k8s_ingress_nginx_chart_version }}"
    release_name: ingress-nginx
    release_namespace: "{{ k8s_ingress_nginx_namespace }}"
    release_values: "{{ (lookup('template', 'ingress-nginx/chart-values-%s.yaml' % k8s_cluster_type) | from_yaml) or omit }}"
    wait: yes
  when: k8s_install_ingress_controller

- name: Add cert-manager Helm chart
  kubernetes.core.helm:
    context: "{{ k8s_context|mandatory }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    chart_repo_url: "https://charts.jetstack.io"
    chart_ref: cert-manager
    chart_version: "{{ k8s_cert_manager_chart_version }}"
    release_name: cert-manager
    release_namespace: "{{ k8s_cert_manager_namespace }}"
    release_values: "{{ k8s_cert_manager_release_values }}"
    wait: yes
  when: k8s_install_cert_manager

- name: Deploy Let's Encrypt issuers
  kubernetes.core.k8s:
    context: "{{ k8s_context|mandatory }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    wait: yes
    # cert-manager's custom resource definitions don't validate,
    # so this is disabled for now.
    # validate:
    #   fail_on_error: yes
    #   strict: yes
    definition: "{{ lookup('template', 'letsencrypt/issuers.yaml') }}"
  when: k8s_install_cert_manager

- name: Grant access to IAM users if aws
  when: k8s_cluster_type == "aws"
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'aws/cluster-auth.yaml') }}"
    context: "{{ k8s_context }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    wait: yes
    validate:
      fail_on_error: yes
      strict: yes

- name: Create traefik namespace
  tags: traefik
  kubernetes.core.k8s:
    context: "{{ k8s_context|mandatory }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    name: "{{ k8s_traefik_namespace }}"
    api_version: v1
    kind: Namespace
    state: present
  when: k8s_web_cluster_role_install_traefik

# Helm upgrade does not manage traefik CRDs upgrade. These have to be separately upgraded prior to a chart upgrade as per official documentation:
# https://github.com/traefik/traefik-helm-chart?tab=readme-ov-file#upgrading
# ChangeLog for upgrade v38 to v39 https://github.com/traefik/traefik-helm-chart/blob/v39.0.8/traefik/Changelog.md#3900----

# Fetch list of all crds for a specific chart version (k8s_traefik_chart_version) with the download link
- name: Get list of CRD manifest metadata from Github
  tags: traefik
  ansible.builtin.uri:
    url: "https://api.github.com/repos/traefik/traefik-helm-chart/contents/traefik/crds?ref={{ k8s_traefik_chart_version }}"
    return_content: yes
  register: crd_list
  when: k8s_web_cluster_role_install_traefik

# Download the CRD manifests and apply them.
- name: Download and Apply Traefik CRDs
  tags: traefik
  kubernetes.core.k8s:
    context: "{{ k8s_context|mandatory }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition: "{{ lookup('url', item.download_url, split_lines=False) }}"
  loop: "{{ crd_list.json }}"
  loop_control:
    label: "{{ item.name }}"
  when: 
    - k8s_web_cluster_role_install_traefik
    - item.name.endswith('.yaml')
    - item.name != 'kustomization.yaml' # Skip as this is not a crd installed in the cluster

- name: Add Traefik Helm chart
  tags: traefik
  kubernetes.core.helm:
    context: "{{ k8s_context|mandatory }}"
    kubeconfig: "{{ k8s_kubeconfig }}"
    chart_repo_url: "https://traefik.github.io/charts"
    chart_ref: traefik
    chart_version: "{{ k8s_traefik_chart_version }}"
    release_name: "traefik"
    release_namespace: "{{ k8s_traefik_namespace }}"
    release_values: "{{ k8s_traefik_release_values | default(lookup('template', 'traefik/chart-values-%s.yaml' % k8s_cluster_type) | from_yaml) or omit }}"
    wait: yes
  when: k8s_web_cluster_role_install_traefik
